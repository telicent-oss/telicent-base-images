modules:
  repositories:
    - path: ../modules
  install:
    - name: telicent.container.util.pkg-update
    - name: telicent.container.util.tzdata
    - name: telicent.container.tar-gzip
    - name: telicent.container.user

packages:
  install:
    - glibc-langpack-en
    - gcc
    - gcc-c++
    - make
    - pcre2-devel
    - zlib-devel
    - openssl-devel
    - wget
    - gnupg2
    - ca-certificates
    - bsdtar

execute:
